<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI-powered X content assistant for software engineers">
  <title>X Growth Assistant</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div id="app">
    <aside class="sidebar" role="complementary">
      <div class="sidebar-header">
        <h1 class="app-title">X Growth Assistant</h1>
        <p class="app-subtitle">AI co-pilot for engineers</p>
      </div>

      <nav class="nav-modules" role="navigation" aria-label="Main modules">
        <button class="nav-tab active" data-module="tweet-generator" aria-current="page" id="nav-tweet-generator">
          <span class="nav-icon" aria-hidden="true">✍️</span>
          <span class="nav-label">Tweet Generator</span>
        </button>
        <button class="nav-tab" data-module="reply-writer" id="nav-reply-writer">
          <span class="nav-icon" aria-hidden="true">💬</span>
          <span class="nav-label">Reply Writer</span>
        </button>
        <button class="nav-tab" data-module="content-planner" id="nav-content-planner">
          <span class="nav-icon" aria-hidden="true">📅</span>
          <span class="nav-label">Content Ideas</span>
        </button>
        <button class="nav-tab" data-module="bio-builder" id="nav-bio-builder">
          <span class="nav-icon" aria-hidden="true">👤</span>
          <span class="nav-label">Bio Builder</span>
        </button>
        <button class="nav-tab" data-module="history" id="nav-history">
          <span class="nav-icon" aria-hidden="true">🕐</span>
          <span class="nav-label">History</span>
        </button>
        <button class="nav-tab" data-module="settings" id="nav-settings-mobile" style="display:none" aria-hidden="true">
          <span class="nav-icon" aria-hidden="true">⚙️</span>
          <span class="nav-label">Settings</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-tab" data-module="settings" id="nav-settings">
          <span class="nav-icon" aria-hidden="true">⚙️</span>
          <span class="nav-label">Settings</span>
        </button>
      </div>
    </aside>

    <main class="main-content" id="main-content" role="main" aria-live="polite" aria-label="Module content">
      <div id="module-container"></div>
    </main>
  </div>

  <script src="js/app.js" defer></script>
</body>

</html>
