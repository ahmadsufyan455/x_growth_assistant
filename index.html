<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI-powered X content assistant for software engineers">
  <title>X Growth Assistant</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Colors */
      --bg-primary: #0A0A0A;
      --bg-secondary: #111111;
      --bg-tertiary: #1A1A1A;
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A0;
      --text-tertiary: #666666;
      --accent-primary: #1D9BF0;
      --accent-hover: #1A8CD8;
      --border-color: #2A2A2A;
      --error-color: #F44336;
      --success-color: #4CAF50;
      
      /* Typography */
      --font-ui: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      
      /* Spacing */
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      
      /* Border Radius */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      
      /* Transitions */
      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Application structure will be built here -->
  </div>
  
  <script>
    // Gemini API Configuration
    const GeminiAPI = {
      baseURL: 'https://generativelanguage.googleapis.com/v1beta/models',
      model: 'gemini-2.5-flash',
      maxOutputTokens: 1024,
      timeout: 8000,
      
      systemPrompt: `You are a personal branding expert for software engineers building in public on X.
The user is a software engineer transitioning to solopreneur, focused on AI and indie hacking.
Write content that feels authentic, smart, and human.
No hashtags. Minimal emojis. Engineer voice. Return only raw JSON.`
    }

    // Application State
    const AppState = {
      apiKey: null,
      nicheProfile: null,
      currentModule: 'tweet-generator',
      history: [],
      
      init() {
        this.loadFromStorage();
        this.setupEventListeners();
        this.render();
      },
      
      loadFromStorage() {
        this.apiKey = localStorage.getItem('xgrowth_api_key');
        this.nicheProfile = JSON.parse(localStorage.getItem('xgrowth_niche') || 'null');
        this.history = JSON.parse(localStorage.getItem('xgrowth_history') || '[]');
      },
      
      saveToStorage() {
        if (this.apiKey) localStorage.setItem('xgrowth_api_key', this.apiKey);
        if (this.nicheProfile) localStorage.setItem('xgrowth_niche', JSON.stringify(this.nicheProfile));
        localStorage.setItem('xgrowth_history', JSON.stringify(this.history));
      },

      // Gemini API - JSON Extraction
      extractJSON(rawText) {
        // Strategy 1: Direct parse
        try {
          return JSON.parse(rawText)
        } catch (e) {}

        // Strategy 2: Strip markdown code fences
        try {
          const fenceMatch = rawText.match(/```(?:json)?\s*([\s\S]*?)\s*```/)
          if (fenceMatch) {
            return JSON.parse(fenceMatch[1])
          }
        } catch (e) {}

        // Strategy 3: Extract JSON object with regex
        try {
          const jsonMatch = rawText.match(/\{[\s\S]*\}/)
          if (jsonMatch) {
            return JSON.parse(jsonMatch[0])
          }
        } catch (e) {}

        // All strategies failed
        throw new Error('Failed to parse JSON response. Raw output:\n' + rawText.substring(0, 500))
      },

      // Gemini API - Core API Call
      async callGeminiAPI(userMessage, apiKey, customSystemPrompt = null) {
        if (!apiKey) {
          throw new Error('API key is required. Please set it in Settings.')
        }

        const controller = new AbortController()
        const timeoutId = setTimeout(() => controller.abort(), GeminiAPI.timeout)

        try {
          const response = await fetch(`${GeminiAPI.baseURL}/${GeminiAPI.model}:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            signal: controller.signal,
            body: JSON.stringify({
              systemInstruction: {
                parts: [{ text: customSystemPrompt || GeminiAPI.systemPrompt }]
              },
              contents: [{
                parts: [{ text: userMessage }]
              }],
              generationConfig: {
                maxOutputTokens: GeminiAPI.maxOutputTokens,
                temperature: 0.9,
                topP: 0.95,
                topK: 40
              },
              thinkingConfig: {
                thinkingBudget: 0
              }
            })
          })

          clearTimeout(timeoutId)

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}))
            throw new Error(this.parseAPIError(response.status, errorData))
          }

          const data = await response.json()
          const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text

          if (!rawText) {
            throw new Error('Empty response from API')
          }

          return this.extractJSON(rawText)
        } catch (error) {
          clearTimeout(timeoutId)
          if (error.name === 'AbortError') {
            throw new Error('Request timed out. Please try again.')
          }
          throw error
        }
      },

      // Gemini API - Usage Example
      async generateTweet(topic, tone, format) {
        const userMessage = `Generate 2 tweet variations about: ${topic}
Tone: ${tone}
Format: ${format}

Return JSON: { "variations": [{ "label": "Variation 1", "text": "..." }, { "label": "Variation 2", "text": "..." }] }`;

        try {
          const result = await this.callGeminiAPI(userMessage, this.apiKey);
          return result.variations;
        } catch (error) {
          console.error('Tweet generation failed:', error);
          throw error;
        }
      },
      
      setupEventListeners() {
        // Will be populated by module specs
      },
      
      render() {
        // Will be populated by layout spec
      },

      // Gemini API - Error Message Mapping
      parseAPIError(statusCode, errorData) {
        const errorMessage = errorData?.error?.message || '';
        
        switch (statusCode) {
          case 400:
            if (errorMessage.includes('API_KEY_INVALID')) {
              return 'Invalid API key. Please check your key in Settings.';
            }
            return `Bad request: ${errorMessage}`;
            
          case 401:
            return 'Unauthorized. Please check your API key.';
            
          case 403:
            return 'Access forbidden. Your API key may not have access to this model.';
            
          case 429:
            return 'Rate limit exceeded. Please wait a moment and try again.';
            
          case 500:
          case 502:
          case 503:
            return 'Google API is temporarily unavailable. Please try again.';
            
          default:
            return `API error (${statusCode}): ${errorMessage || 'Unknown error'}`;
        }
      }
    };

    // Initialize on DOM ready
    document.addEventListener('DOMContentLoaded', () => {
      AppState.init();
    });
  </script>
</body>
</html>
